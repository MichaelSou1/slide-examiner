### model
model_name_or_path: /home/gpus/models/Qwen3-VL-8B-Instruct
trust_remote_code: true
image_max_pixels: 589824
quantization_bit: 4
quantization_method: bnb

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset: slide_examiner_part2
dataset_dir: /home/gpus/slide-examiner/data/part2/sft
template: qwen3_vl_nothink
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 12
dataloader_num_workers: 4

### output
output_dir: /home/gpus/slide-examiner/runs/part2/examiner_lora_v2
logging_steps: 5
save_steps: 100
save_total_limit: 4
plot_loss: true
overwrite_output_dir: true
report_to: wandb
run_name: part2-examiner-8b-qlora-v2

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true

### eval (health monitoring: watch eval_loss for overfitting / collapse)
val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 50
